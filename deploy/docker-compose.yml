# Deployment Layer — runtime topology (Docker Compose v2).
#
# This file defines WHAT runs on the application server. It is driven entirely
# by environment variables so the same topology serves every environment; the
# Deployment Layer (deploy.sh) injects APP_IMAGE (pinned by digest) at deploy
# time and never edits this file.
#
# Application state MUST live in named volumes / external databases — never in
# the container filesystem and never on the runner.

name: ${COMPOSE_PROJECT_NAME:-app}

services:
  app:
    # Injected by deploy.sh (immutable, digest-pinned, cosign-verified image).
    image: ${APP_IMAGE:?APP_IMAGE must be provided by the Deployment Layer}
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '${APP_CPU_LIMIT:-1}'
          memory: ${APP_MEM_LIMIT:-512M}
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true
