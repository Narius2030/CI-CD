name: CD

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    uses: ./.github/workflows/reusable-node-ci.yml

  build-push:
    name: Build, scan, sign & push
    needs: quality
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/reusable-docker.yml
    with:
      version: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}

  deploy-staging:
    name: Deploy to staging
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Verify signature before deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          cosign verify \
            --certificate-identity-regexp "^${{ github.server_url }}/${{ github.repository }}/.github/workflows/.+@.+$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE"

      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: echo "Deploying $IMAGE to staging"

  deploy-production:
    name: Deploy to production
    needs: [build-push, deploy-staging]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3

      - name: Verify signature before deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: |
          cosign verify \
            --certificate-identity-regexp "^${{ github.server_url }}/${{ github.repository }}/.github/workflows/.+@.+$" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "$IMAGE"

      - name: Deploy
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
        run: echo "Deploying $IMAGE to production"
