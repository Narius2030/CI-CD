name: CD

on:
  repository_dispatch:
    types: [release-created]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (tag/branch/SHA) to build & deploy; empty uses main HEAD
        required: false
        default: ''
      version:
        description: Version label for the image (optional)
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  # Resolve the exact commit + version to build. For a release this is the SHA
  # the tag was created at (from release.yml), so CD builds precisely the tagged
  # commit rather than whatever happens to be on main HEAD at dispatch time.
  prepare:
    name: Resolve build context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ref: ${{ steps.ctx.outputs.ref }}
      version: ${{ steps.ctx.outputs.version }}
    steps:
      - id: ctx
        env:
          DISPATCH_SHA: ${{ github.event.client_payload.sha }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          ref="${DISPATCH_SHA:-$INPUT_REF}"
          version="${DISPATCH_VERSION:-$INPUT_VERSION}"
          echo "ref=${ref}" >>"$GITHUB_OUTPUT"
          echo "version=${version}" >>"$GITHUB_OUTPUT"
          echo "Building ref='${ref:-<main HEAD>}' version='${version:-<none>}'"

  quality:
    name: Quality gate
    needs: prepare
    uses: ./.github/workflows/reusable-node-ci.yml
    with:
      ref: ${{ needs.prepare.outputs.ref }}

  build-push:
    name: Build, scan, sign & push
    needs: [prepare, quality]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/reusable-docker.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.ref }}

  # ---------------------------------------------------------------------------
  # Deploy jobs are ORCHESTRATORS ONLY. All deployment logic (verify, pull,
  # compose up, health check, rollback, cleanup) lives in the Deployment Layer
  # under ./deploy and runs on a self-hosted runner that sits on the target
  # server. See .github/Production_CICD_Architecture_Guide.md and deploy/README.md.
  #
  # `runs-on` is configurable via repository variables so this template is not
  # hard-wired to one runner. Defaults to `self-hosted` when unset.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to staging
    needs: [prepare, build-push]
    runs-on: ${{ fromJSON(vars.DEPLOY_RUNS_ON_STAGING || '["self-hosted"]') }}
    timeout-minutes: 15
    environment: staging
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy via Deployment Layer
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
          DEPLOY_ENV: staging
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/deployment' }}
          HEALTHCHECK_URL: ${{ vars.STAGING_HEALTHCHECK_URL || 'http://localhost:3000/health' }}
          COSIGN_CERT_IDENTITY_REGEXP: '^${{ github.server_url }}/${{ github.repository }}/.github/workflows/.+@.+$'
          COSIGN_CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./deploy/*.sh
          ./deploy/deploy.sh

  deploy-production:
    name: Deploy to production
    needs: [prepare, build-push, deploy-staging]
    runs-on: ${{ fromJSON(vars.DEPLOY_RUNS_ON_PRODUCTION || '["self-hosted"]') }}
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Deploy via Deployment Layer
        env:
          IMAGE: ${{ needs.build-push.outputs.image }}
          DEPLOY_ENV: production
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || '/opt/deployment' }}
          HEALTHCHECK_URL: ${{ vars.PRODUCTION_HEALTHCHECK_URL || 'http://localhost:3000/health' }}
          COSIGN_CERT_IDENTITY_REGEXP: '^${{ github.server_url }}/${{ github.repository }}/.github/workflows/.+@.+$'
          COSIGN_CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./deploy/*.sh
          ./deploy/deploy.sh
